<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile HTML Editor</title>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; background: #222; color: #fff; }
        h3 { margin-top: 0; }
        textarea { width: 100%; height: 60vh; background: #1e1e1e; color: #00ff00; border: 1px solid #444; font-family: monospace; font-size: 16px; padding: 10px; box-sizing: border-box; border-radius: 5px; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h3>Mobile Code Editor</h3>
    <textarea id="codeEditor" placeholder="Nhập code HTML vào đây..."><h1>Xin chào bro!</h1>
<p>Code đã được cập nhật tự động.</p></textarea>

    <div class="controls">
        <input type="text" id="roomInput" placeholder="Nhập tên màn hình chạy...">
        <button id="runBtn">RUN</button>
    </div>

    <script>
        const socket = io();
        const runBtn = document.getElementById('runBtn');
        const codeEditor = document.getElementById('codeEditor');
        const roomInput = document.getElementById('roomInput');

        runBtn.addEventListener('click', () => {
            const roomName = roomInput.value.trim();
            const htmlCode = codeEditor.value;

            if (!roomName) {
                alert('Vui lòng nhập tên màn hình chạy để kết nối!');
                return;
            }

            // Gửi code lên server kèm theo tên phòng
            socket.emit('send-code', { roomName, htmlCode });
            alert(`Đã gửi code tới màn hình: ${roomName}`);
        });
    </script>
</body>
</html>
